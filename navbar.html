<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Variations</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #454040;
            color: white;
            padding: 20px;
            
        }

        .nav-container {
            margin-bottom: 40px;
        }

        h2 {
            margin-bottom: 10px;
        }
        .nav1{
            background-color: #eaeaed;
            padding: 10px;
        }
        .nav1 ul{
            list-style-type: none;
            display: flex;
            margin:0;
            padding:0;
            justify-content:space-around;
        }
        .nav1 li{
            display: inline;
        }
        .nav1 a{
            text-decoration: none;
            color: #0f0e0e;
            /* background-color: #d45b04; */
            padding:5px 15px;
            position: relative;
        }
        .nav1 a:after{
            content: "";
            position: absolute;
            height: 2px;
            width:100%;
            bottom: 0;
            left:0;
            background-color: #0a65c7;
            transform: scaleX(0);
            transform: transform 0.3s
            ease-in-out;
        }
        .nav1 a:hover::after{
            transform:scaleX(1);
        }
        .nav1 .login-btn{
              background-color: #254bf6;
              color: #fff ;
              border:none;
              padding:5px 15px;
              border-radius: 5px;
              cursor: pointer;
         }

        
    </style>
</head>
<body>

    <!-- Variation 1 -->
    <div class="nav-container">
        <h2>Variation 1: Horizontal with underline effect</h2>

        <nav class="nav1">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li><button class="login-btn">Login</button></li>
            </ul>
        </nav>
    </div>

    <!-- Variation 2 -->
    <div class="nav-container">
        <h2>Variation 2: Vertical with hover effect</h2>

        <nav class="nav2">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
            </ul>

            <button>Login</button>
        </nav>
    </div>

    <!-- Variation 3 -->
    <div class="nav-container">
        <h2>Variation 3: Horizontal with dropdown</h2>

        <nav class="nav3">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>

                <li class="dropdown">
                    <a href="#">Products ▼</a>

                    <div class="dropdown-menu">
                        <a href="#">Product 1</a>
                        <a href="#">Product 2</a>
                        <a href="#">Product 3</a>
                    </div>
                </li>

                <li><button>Login</button></li>
            </ul>
        </nav>
    </div>

</body>
</html>
